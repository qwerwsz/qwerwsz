name: Update IoT Device Data

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Fetch ebike location SVGs
      run: |
        mkdir -p data
        curl -fsSL "https://smart-backend-eta.vercel.app/ebike/newest-location-xml?theme=light" -o data/ebike-location-light.svg
        curl -fsSL "https://smart-backend-eta.vercel.app/ebike/newest-location-xml?theme=dark" -o data/ebike-location-dark.svg

    - name: Commit and push
      run: |
        git config --local user.email "admin@daka.today"
        git config --local user.name "qwerwsz"
        git add data/ebike-location-light.svg data/ebike-location-dark.svg
        git diff --staged --quiet || (git commit -m "chore(iot): update ebike location data" && git push)
