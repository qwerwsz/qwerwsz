name: Update Certificate Images

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Fetch certificate SVGs
      run: |
        mkdir -p data
        curl -fsSL -o data/certs-light.svg 'https://certificate-mu-beige.vercel.app/certs_image?page=1&limit=20'
        curl -fsSL -o data/certs-dark.svg 'https://certificate-mu-beige.vercel.app/certs_image?page=1&limit=20&theme=dark'

    - name: Commit and push
      run: |
        git config --local user.email "admin@daka.today"
        git config --local user.name "qwerwsz"
        git add data/certs-light.svg data/certs-dark.svg
        git diff --staged --quiet || (git commit -m "chore(ci): update certificate images" && git push)
